# Depo kökünde derle (panelde yanlışlıkla "remax" base verilmişse bunu ezer)
[build]
  base = "."
  command = "npm install"
  publish = "public"

[build.environment]
  NODE_VERSION = "20"

# functions yolu varsayılan: netlify/functions — [build] içinde "functions" kullanılmamalı (parse hatası)
[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@netlify/blobs"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200
